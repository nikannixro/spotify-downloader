name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit
      - run: pip install -r requirements.txt
      - run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-38 --ignore-vuln PYSEC-2026-161 --ignore-vuln PYSEC-2026-249 --ignore-vuln PYSEC-2026-248 --ignore-vuln CVE-2024-47874 --ignore-vuln CVE-2025-54121 --ignore-vuln CVE-2026-48818 --ignore-vuln CVE-2026-48817

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: spotify-downloader:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
